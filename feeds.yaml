# feeds.yaml — news sources for the Victoria BC Morning Brief.
#
# Each source needs either `url` (RSS feed) or `search` (DuckDuckGo query).
# `name` is how the source appears as a section header in the digest.
#

notify:
  - myerman@gmail.com


# Optional `weight` (default 1.0) sets a baseline priority multiplier.
# Sources are sorted dynamically each run by: weight × gravity_score,
# where gravity_score reflects how "heavy" today's stories are
# (national news, BC politics, supreme court, breaking events, etc.).

sources:

  # --- BC-wide / heavy news (high baseline weight) ---
  - name: "CBC British Columbia"
    url: "https://www.cbc.ca/cmlink/rss-canada-britishcolumbia"
    weight: 2.0
    category: "BC News"

  - name: "BC Government News"
    url: "https://news.gov.bc.ca/rss/news"
    weight: 1.8
    category: "BC News"

  - name: "Global News BC"
    url: "https://globalnews.ca/bc/feed/"
    weight: 1.6
    category: "BC News"

  # --- First Nations (high baseline — core interest) ---
  - name: "APTN National News"
    url: "https://www.aptnnews.ca/national-news/feed/"
    weight: 1.8
    category: "Indigenous"

  - name: "CBC Indigenous"
    url: "https://www.cbc.ca/cmlink/rss-cbcindigenous"
    weight: 1.8
    category: "Indigenous"

  - name: "First Nations — Victoria & Island"
    search: "Songhees OR Esquimalt OR WSANEC OR Lekwungen OR Nuu-chah-nulth Victoria BC OR Vancouver Island First Nations news"
    weight: 1.6
    category: "Indigenous"

  # --- Local Victoria / Vancouver Island news ---
  - name: "CHEK News"
    url: "https://www.cheknews.ca/feed/"
    weight: 1.4
    category: "Victoria & Island"

  - name: "Times Colonist"
    url: "https://www.timescolonist.com/rss/news"
    weight: 1.4
    category: "Victoria & Island"

  - name: "Victoria Buzz"
    url: "https://victoriabuzz.com/feed/"
    weight: 1.0
    category: "Victoria & Island"

  - name: "Business Examiner Vancouver Island"
    url: "https://businessexaminer.ca/feed/"
    weight: 1.1
    category: "Jobs & Economy"

  - name: "Douglas Magazine"
    url: "https://douglasmagazine.com/feed/"
    weight: 1.0
    category: "Victoria & Island"

  # --- Tech & Jobs ---
  - name: "BC Tech & Startups"
    search: "Victoria BC OR Vancouver Island tech startup news announcement"
    weight: 1.2
    category: "Jobs & Economy"

  - name: "Vancouver Island Jobs"
    search: "Victoria BC OR Vancouver Island hiring jobs 2026 -site:ziprecruiter.com -site:indeed.com -site:linkedin.com -site:glassdoor.com"
    weight: 0.9
    category: "Jobs & Economy"

  # --- Arts & Culture ---
  - name: "BC Arts Council"
    search: "BC Arts Council grant funding announcement"
    weight: 1.0
    category: "Arts & Culture"

  # --- Canadian Sports (rugby, lacrosse, Indigenous games) ---
  - name: "Rugby Canada"
    url: "https://www.rugbycanada.ca/feed/"
    hours: 168
    weight: 1.3
    category: "Sports"

  - name: "Rugby — RugbyPass"
    url: "https://www.rugbypass.com/feeds/rss/"
    hours: 168
    weight: 1.0
    category: "Sports"

  - name: "NLL — National Lacrosse League"
    url: "https://www.nll.com/feed/"
    hours: 168
    weight: 1.3
    category: "Sports"

  - name: "Lacrosse — Inside Lacrosse"
    url: "https://www.insidelacrosse.com/feed/"
    hours: 168
    weight: 1.1
    category: "Sports"

  - name: "APTN News"
    url: "https://www.aptnnews.ca/feed/"
    hours: 168
    weight: 1.2
    category: "Sports"

  - name: "CBC Indigenous"
    url: "https://www.cbc.ca/cmlink/rss-cbcindigenous"
    hours: 168
    weight: 1.2
    category: "Sports"

  # Events: RSS feeds for real local event listings (7-day lookback — events post in advance)
  - name: "Victoria Buzz Events"
    url: "https://victoriabuzz.com/category/events/feed/"
    hours: 168
    weight: 1.1
    category: "Events"

  - name: "Times Colonist Entertainment"
    url: "https://www.timescolonist.com/rss/entertainment"
    hours: 168
    weight: 1.2
    category: "Events"

  - name: "Victoria Indigenous & Cultural Events"
    search: "Victoria BC Vancouver Island powwow First Nations festival Indigenous cultural event 2026"
    weight: 1.0
    category: "Events"

  # --- University & Research ---
  - name: "UVic News"
    url: "https://www.uvic.ca/news/rss/"
    weight: 1.1
    category: "Education"

  # --- Housing & Ferries ---
  - name: "BC Ferries"
    search: "BC Ferries disruption cancellation schedule change"
    weight: 1.2
    category: "Housing & Transit"

  - name: "Victoria Housing & Real Estate"
    search: "Victoria BC rental housing market rent prices 2026"
    weight: 1.0
    category: "Housing & Transit"
