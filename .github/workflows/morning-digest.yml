name: Victoria Morning Brief

on:
  schedule:
    # 16:00 UTC = 9 AM PDT (UTC-7) / 8 AM PST (UTC-8)
    - cron: "0 16 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install package
        run: pip install .

      - name: Generate brief
        run: victoria-brief --file index.html

      - name: Commit and push
        run: |
          git config user.name "Victoria Brief Bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "brief: $(date -u '+%Y-%m-%d')"
          git push
